<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com">
  <title>{{PAGE_TITLE}} — Preview</title>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    img, picture, video, canvas, svg { display: block; max-width: 100%; }
    input, button, textarea, select { font: inherit; }

    /* === TOKENS (replace with generated values from tokens.json) === */
    :root {
      /* Colors */
      --color-primary-50: #eff6ff;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-900: #1e3a5f;
      --color-neutral-0: #ffffff;
      --color-neutral-50: #f9fafb;
      --color-neutral-100: #f3f4f6;
      --color-neutral-200: #e5e7eb;
      --color-neutral-300: #d1d5db;
      --color-neutral-500: #6b7280;
      --color-neutral-700: #374151;
      --color-neutral-800: #1f2937;
      --color-neutral-900: #111827;
      --color-semantic-success: #22c55e;
      --color-semantic-warning: #f59e0b;
      --color-semantic-error: #ef4444;
      --color-semantic-info: #3b82f6;
      --color-bg-default: #ffffff;
      --color-bg-surface: #f9fafb;
      --color-text-primary: #111827;
      --color-text-secondary: #6b7280;
      --color-text-disabled: #9ca3af;
      --color-text-inverse: #ffffff;

      /* Typography */
      --font-heading: Inter, system-ui, -apple-system, sans-serif;
      --font-body: Inter, system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
      --font-size-xs: 12px;
      --font-size-sm: 14px;
      --font-size-base: 16px;
      --font-size-lg: 18px;
      --font-size-xl: 20px;
      --font-size-2xl: 24px;
      --font-size-3xl: 32px;
      --font-size-4xl: 48px;
      --font-weight-regular: 400;
      --font-weight-medium: 500;
      --font-weight-semibold: 600;
      --font-weight-bold: 700;
      --line-height-tight: 1.25;
      --line-height-normal: 1.5;

      /* Spacing */
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-16: 64px;

      /* Radii */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;

      /* Shadows */
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.1);
    }

    /* === BASE === */
    body {
      font-family: var(--font-body);
      font-size: var(--font-size-base);
      line-height: var(--line-height-normal);
      color: var(--color-text-primary);
      background: var(--color-bg-default);
    }

    /* === PAGE CONTENT (replace below) === */

    /* {{PAGE_STYLES}} */
  </style>
</head>
